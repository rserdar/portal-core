<div class="container py-4">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 1200px;">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="card-title mb-0">Firma Ekleme</h5>
        </div>
        <div class="card-body p-4" id="content-add">
            <!-- Unvan -->
            <div class="row g-3 mb-3">
                <div class="col-md-12 form-floating">
                    <input type="text" class="form-control" id="unvanInput" name="unvan" placeholder="Unvan">
                    <label for="unvanInput" class="bi bi-building"> Unvan</label>
                </div>
            </div>

            <!-- Adres, Şehir ve Ülke Bilgisi Yan Yana -->
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <div class="form-floating flex-grow-1">
                            <input type="text" class="form-control" id="adresInput" name="adres" placeholder="Adres">
                            <label for="adresInput" class="bi bi-map"> Adres</label>
                        </div>
                        <span class="input-group-text"> - </span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <div class="form-floating flex-grow-1">
                            <input type="text" class="form-control" id="sehirInput" name="sehir" placeholder="Şehir">
                            <label for="sehirInput" class="bi bi-geo-alt"> Şehir</label>
                        </div>
                        <span class="input-group-text"> / </span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <div class="form-floating flex-grow-1">
                            <input type="text" class="form-control" id="ulkeInput" name="ulke" placeholder="Ülke">
                            <label for="ulkeInput" class="bi bi-globe"> Ülke</label>
                        </div>
                        <button type="button" class="btn btn-outline-info dropdown-toggle dropdown-toggle-split"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="visually-hidden">Country Dropdown</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item bi bi-file-earmark-arrow-up" href="#" id="adresBuyuk"> Türkçe
                                    Büyük
                                    Harf</a></li>
                            <li><a class="dropdown-item bi bi-file-earmark-arrow-up" href="#" id="addressBig"> İngilizce
                                    Büyük
                                    Harf</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item btn btn-outline-danger bi bi-flag" href="#" id="addTurkiye">
                                    Türkiye
                                    Ekle</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Şube Adresi -->
            <div class="row g-3 mb-3">
                <div class="col-md-12 form-floating">
                    <input type="text" class="form-control" id="yazismaInput" name="yazisma" placeholder="Şube Adresi">
                    <label for="yazismaInput" class="bi bi-house"> Şube Adresi</label>
                </div>
            </div>

            <!-- Türkçe Kapsam -->
            <div class="input-group mb-3">
                <div class="form-floating">
                    <textarea class="form-control" placeholder="Türkçe sertifika kapsamı" id="kapsamInput" name="kapsam"
                        style="height: 100px"></textarea>
                    <label for="kapsamInput" class="bi bi-journal-text"> Türkçe Kapsam</label>
                </div>
                <button type="button" class="btn btn-outline-info dropdown-toggle dropdown-toggle-split"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="visually-hidden">Kapsam Dropdown</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item bi bi-file-earmark-arrow-up" href="#" id="kapsamBuyuk"> Türkçe Büyük
                            Harf</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item bi bi-translate" href="#" id="kapsamToScope"> İngilizceye Çevir</a></li>
                </ul>
            </div>

            <!-- İngilizce Kapsam -->
            <div class="input-group mb-3">
                <div class="form-floating">
                    <textarea class="form-control" placeholder="İngilizce sertifika kapsamı" id="scopeInput"
                        name="scope" style="height: 100px"></textarea>
                    <label for="scopeInput" class="bi bi-journal-text"> İngilizce Kapsam</label>
                </div>
                <button type="button" class="btn btn-outline-info dropdown-toggle dropdown-toggle-split"
                    data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="visually-hidden">Scope Dropdown</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item bi bi-file-earmark-arrow-up" href="#" id="scopeBig"> İngilizce Büyük
                            Harf</a></li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item bi bi-translate" href="#" id="scopeToKapsam"> Türkçeye Çevir</a></li>
                </ul>
            </div>

            <!-- Telefon, Faks, E-Posta Bilgisi Yan Yana -->
            <div class="row g-3 mb-3">
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="telefonInput" name="tel" placeholder="Telefon">
                    <label for="telefonInput" class="bi bi-telephone"> Telefon</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="faxInput" name="faks" placeholder="Faks">
                    <label for="faxInput" class="bi bi-telephone-plus"> Faks</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="email" class="form-control" id="emailInput" name="mail" placeholder="E-Posta">
                    <label for="emailInput" class="bi bi-at"> E-Posta</label>
                </div>
            </div>

            <!-- İnternet Sayfası, Vergi Dairesi, Vergi Numarası Yan Yana -->
            <div class="row g-3 mb-3">
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="wwwInput" name="www" placeholder="Internet Sayfası">
                    <label for="wwwInput" class="bi bi-link-45deg"> Internet Sayfası</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="vergiDInput" name="vergiD" placeholder="Vergi Dairesi">
                    <label for="vergiDInput" class="bi bi-wallet2"> Vergi Dairesi</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="vergiNInput" name="vergiN" placeholder="Vergi Numarası">
                    <label for="vergiNInput" class="bi bi-cash"> Vergi Numarası</label>
                </div>
            </div>

            <!-- Yönetim Temsilcisi, Yetkili Adı, Yetkili Unvanı Yan Yana -->
            <div class="row g-3 mb-3">
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="kytInput" name="kyt" placeholder="Yönetim Temsilcisi">
                    <label for="kytInput" class="bi bi-person-check-fill"> Yönetim Temsilcisi</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="yetkiliInput" name="yetA" placeholder="Yetkili Adı">
                    <label for="yetkiliInput" class="bi bi-person-badge"> Yetkili Adı</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="yetkiliUnInput" name="yetU"
                        placeholder="Yetkili Unvanı">
                    <label for="yetkiliUnInput" class="bi bi-file-person"> Yetkili Unvanı</label>
                </div>
            </div>

            <!-- İrtibat Bilgileri Yan Yana -->
            <div class="row g-3 mb-3">
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="irtibatInput" name="irtA" placeholder="İrtibat Kişisi">
                    <label for="irtibatInput" class="bi bi-file-earmark-person"> İrtibat Kişisi</label>
                </div>
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="iUnvanInput" name="irtU"
                        placeholder="İrtibat Kişisi Unvanı">
                    <label for="iUnvanInput" class="bi bi-person-bounding-box"> İrtibat Kişisi Unvanı</label>
                </div>
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="iTelInput" name="irtN"
                        placeholder="İrtibat Kişisi Telefonu">
                    <label for="iTelInput" class="bi bi-phone"> İrtibat Kişisi Telefonu</label>
                </div>
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="iMailInput" name="irtM"
                        placeholder="İrtibat Kişisi E-Posta">
                    <label for="iMailInput" class="bi bi-at"> İrtibat Kişisi E-Posta</label>
                </div>
            </div>

            <!-- Firma Kısa Adı ve Notlar Yan Yana -->
            <div class="row g-3 mb-3">
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="nickInput" name="nickname" placeholder="Firma Kısa Adı"
                        aria-describedby="nickInputHelp">
                    <label for="nickInput"><i class="bi bi-arrows-angle-contract me-2"></i>Firma Kısa Adı</label>
                    <div id="nickInputHelp" class="form-text"><i class="bi bi-info-circle me-2"></i>Burada
                        belirlediğiniz
                        isim ayrıca <strong><em>Klasör Adı</em></strong> olarak kullanılır.</div>
                </div>
                <div class="col-md-9 form-floating">
                    <textarea class="form-control" placeholder="Firma Notları" id="notInput" name="not"
                        style="height: 100px"></textarea>
                    <label for="notInput"><i class="bi bi-stickies me-2"></i>Firma Notları</label>
                </div>
            </div>

            <!-- Logo, Kaşe ve Danışman Bilgileri -->
            <div class="row g-3 mb-3">
                <!-- Danışman -->
                <div class="col-12 form-floating">
                    <input class="form-control" list="danList" id="fDanInput" name="danisman" placeholder="Danışman">
                    <label for="fDanInput"><i class="bi bi-people-fill me-2"></i>Danışman</label>
                    <datalist id="danList"></datalist>
                </div>
            </div>

            <!-- Accordion Başlangıcı -->
            <div class="accordion" id="accordionExample">
                <!-- Çalışma Düzeni -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingOne">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne"> Çalışma
                            Düzeni</button>
                    </h2>
                    <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne"
                        data-bs-parent="#accordionExample">
                        <div class="container-fluid mb-3">
                            <div class="row">
                                <div class="col-12 col-md-4 g-3 form-floating">
                                    <input type="text" class="form-control" id="alanInput" name="alan"
                                        placeholder="Alan m2">
                                    <label for="alanInput"><i class="bi bi-textarea me-2"></i>Alan m2</label>
                                </div>
                                <div class="col-12 col-md-4 g-3 form-floating">
                                    <input type="text" class="form-control" id="vardiyaInput" name="vardiya"
                                        placeholder="Vardiya Sayısı">
                                    <label for="vardiyaInput"><i class="bi bi-clock-history me-2"></i>Vardiya
                                        Sayısı</label>
                                </div>
                                <div class="col-12 col-md-4 g-3 form-floating">
                                    <input type="text" class="form-control" id="departmanInput" name="departman"
                                        placeholder="Departman Sayısı">
                                    <label for="departmanInput"><i class="bi bi-person-lines-fill me-2"></i>Departman
                                        Sayısı</label>
                                </div>
                                <div class="col-12 col-md-2 g-3 form-floating">
                                    <input type="text" class="form-control" id="tcsInput" name="tcs"
                                        placeholder="Toplam Çalışan Sayısı">
                                    <label for="tcsInput"><i class="bi bi-people me-2"></i>Toplam Çalışan</label>
                                </div>
                                <div class="col-12 col-md-2 g-3 form-floating">
                                    <input type="text" class="form-control" id="ycsInput" name="ycs"
                                        placeholder="Yönetim Çalışan Sayısı">
                                    <label for="ycsInput"><i class="bi bi-person-fill-up me-2"></i>Yönetim
                                        Çalışan</label>
                                </div>
                                <div class="col-12 col-md-2 g-3 form-floating">
                                    <input type="text" class="form-control" id="ucsInput" name="ucs"
                                        placeholder="Üretim Çalışan Sayısı">
                                    <label for="ucsInput"><i class="bi bi-person-fill-gear me-2"></i>Üretim
                                        Çalışan</label>
                                </div>
                                <div class="col-12 col-md-2 g-3 form-floating">
                                    <input type="text" class="form-control" id="acsInput" name="acs"
                                        placeholder="Aynı İşde Çalışan Sayısı">
                                    <label for="acsInput"><i class="bi bi-person-exclamation me-2"></i>Aynı İş
                                        Çalışan</label>
                                </div>
                                <div class="col-12 col-md-2 g-3 form-floating">
                                    <input type="text" class="form-control" id="yzcsInput" name="yzcs"
                                        placeholder="Yarı Zamanlı Çalışan Sayısı">
                                    <label for="yzcsInput"><i class="bi bi-person-dash-fill me-2"></i>Yarı
                                        Zamanlı</label>
                                </div>
                                <div class="col-12 col-md-2 g-3 form-floating">
                                    <input type="text" class="form-control" id="tacsInput" name="tascs"
                                        placeholder="Taşeron Çalışan Sayısı">
                                    <label for="tacsInput"><i class="bi bi-person-x-fill me-2"></i>Taşeron
                                        Çalışan</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sınıflandırma -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingTwo">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                            Sınıflandırma</button>
                    </h2>
                    <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo"
                        data-bs-parent="#accordionExample">
                        <div class="accordion-body">
                            <div class="row g-3 mb-3">
                                <div class="col-12 col-md-3 form-floating">
                                    <input type="text" class="form-control" id="eaInput" name="ea"
                                        placeholder="EA Kodu">
                                    <label for="eaInput"><i class="bi bi-file-earmark-binary me-2"></i>EA Kodu</label>
                                </div>
                                <div class="col-12 col-md-3 form-floating">
                                    <input type="text" class="form-control" id="naceInput" name="nace"
                                        placeholder="NACE Kodu">
                                    <label for="naceInput"><i class="bi bi-file-earmark-binary-fill me-2"></i>NACE
                                        Kodu</label>
                                </div>
                                <div class="col-12 col-md-3 form-floating">
                                    <input type="text" class="form-control" id="medikalInput" name="medikal"
                                        placeholder="Medikal Kodu">
                                    <label for="medikalInput"><i class="bi bi-heart me-2"></i>Medikal Kodu</label>
                                </div>
                                <div class="col-12 col-md-3 form-floating">
                                    <input type="text" class="form-control" id="gidaInput" name="gida"
                                        placeholder="Gıda Kodu">
                                    <label for="gidaInput"><i class="bi bi-cup-straw me-2"></i>Gıda Kodu</label>
                                </div>
                                <div class="col-12 form-floating">
                                    <textarea class="form-control" placeholder="Yapılan İşler" id="yapisInput"
                                        name="yapis" style="height: 100px"></textarea>
                                    <label for="yapisInput"><i class="bi bi-journal-bookmark-fill me-2"></i>Yapılan
                                        İşler</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- CE Kapsam, Test Raporu ve Teknik Dosya -->
                <div class="accordion-item">
                    <h2 class="accordion-header" id="headingThree">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree"> Doküman
                            ve Teknik Dosya</button>
                    </h2>
                    <div id="collapseThree" class="accordion-collapse collapse" aria-labelledby="headingThree"
                        data-bs-parent="#accordionExample">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-12 col-md-4 form-floating">
                                    <input type="text" class="form-control" id="sinifInput" name="sinif"
                                        placeholder="Firma Sınıfı">
                                    <label for="sinifInput"><i class="bi bi-asterisk me-2"></i>Firma Sınıfı</label>
                                </div>
                                <div class="col-12 col-md-4 d-flex align-items-center form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="dokumanCB"
                                        name="dokuman">
                                    <label class="form-check-label ms-2" for="dokumanCB">Firma Dokümanları mevcut mu
                                        ?</label>
                                </div>
                                <div class="col-12 col-md-4 d-flex align-items-center form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="teknikCB"
                                        name="teknik">
                                    <label class="form-check-label ms-2" for="teknikCB">Teknik Dosyası var mı?</label>
                                </div>
                                <div class="col-12 form-floating">
                                    <textarea class="form-control" placeholder="CE Kapsamı" id="tdInput" name="tkapsam"
                                        style="height: 100px"></textarea>
                                    <label for="tdInput"><i class="bi bi-journal-text me-2"></i>Teknik Dosya
                                        Kapsamı</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div> <!-- Accordion Bitiş -->

            <!-- Kayıt ve İptal Butonları -->
            <div class="d-flex justify-content-between mt-3">
                <button class="btn btn-outline-danger bi bi-x-square" id="cancel-changes"> İptal</button>
                <button class="btn btn-outline-success bi bi-check-square" id="add-company-button"> Kaydet</button>
            </div>

            <div class="alert alert-info invisible mt-3" id="save-success-message" role="alert">
                <i class="bi bi-building"> Yeni Firma Eklendi !!</i>
            </div>

        </div>
    </div>
</div>
