<div class="card shadow-sm border-0 col-11 col-md-8 col-lg-6 mx-auto my-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Firma Bilgileri</h5>
        <a class="btn btn-primary btn-sm ms-auto" href="#" id="addDocsToEdit" aria-label="Bilgileri Düzenle">Düzenle</a>
    </div>

    <div class="card-body">

        <!-- Yükleme Animasyonu -->
        <div id="loading-add" class="card-loading-wrapper d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
        </div>

        <!-- İçerik (ilk başta gizli) -->
        <div id="content-add" style="opacity: 0; pointer-events: none;">
            <!-- Firma ID + Unvan -->
            <div class="row g-3 mb-3">
                <div class="col-md-1 form-floating">
                    <input type="text" class="form-control" id="firma-id" placeholder="ID" disabled>
                    <label for="firma-id"><i class="bi bi-hash me-2"></i>ID</label>
                </div>
                <div class="col-md-11 form-floating">
                    <input type="text" class="form-control" id="unvanInput" name="unvan" placeholder="Unvan" disabled>
                    <label for="unvanInput"><i class="bi bi-building me-2"></i>Unvan</label>
                </div>
            </div>

            <!-- Adres -->
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="adresTamInput" placeholder="Adres - Şehir / Ülke" disabled>
                <label for="adresTamInput"><i class="bi bi-map me-1"></i> Adres</label>
            </div>

            <!-- Kapsam -->
            <div class="form-floating mb-3">
                <textarea class="form-control" id="kapsamInput" placeholder="Kapsam" disabled
                    style="height: 100px"></textarea>
                <label for="kapsamInput"><i class="bi bi-journal-text me-1"></i> Kapsam</label>
            </div>

            <!-- Scope -->
            <div class="form-floating mb-3">
                <textarea class="form-control" id="scopeInput" placeholder="Scope" disabled
                    style="height: 100px"></textarea>
                <label for="scopeInput"><i class="bi bi-journal-text me-1"></i> Scope</label>
            </div>

            <!-- Satır: Telefon - Fax - Mail - Web -->
            <div class="row g-3 mb-3">
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="TelInput" placeholder="Telefon" disabled>
                    <label for="TelInput"><i class="bi bi-telephone me-1"></i> Telefon</label>
                </div>
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="FaxInput" placeholder="Fax" disabled>
                    <label for="FaxInput"><i class="bi bi-telephone-plus me-1"></i> Fax</label>
                </div>
                <div class="col-md-3 form-floating">
                    <input type="email" class="form-control" id="MailInput" placeholder="E-posta" disabled>
                    <label for="MailInput"><i class="bi bi-at me-1"></i> E-posta</label>
                </div>
                <div class="col-md-3 form-floating">
                    <input type="text" class="form-control" id="WebInput" placeholder="Web" disabled>
                    <label for="WebInput"><i class="bi bi-link-45deg me-1"></i> Web</label>
                </div>
            </div>

            <!-- Satır: KYT - Yetkili Adı - Yetkili Unvan -->
            <div class="row g-3 mb-3">
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="KYTInput" placeholder="KYT" disabled>
                    <label for="KYTInput"><i class="bi bi-person-check-fill me-1"></i> KYT</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="YadiInput" placeholder="Yetkili Adı" disabled>
                    <label for="YadiInput"><i class="bi bi-person-badge me-1"></i> Yetkili Adı</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="YUnvanInput" placeholder="Yetkili Unvanı">
                    <label for="YUnvanInput"><i class="bi bi-file-person me-1"></i> Yetkili Unvanı</label>
                </div>
            </div>

            <!-- Satır: Logo - İmza & Kaşe -->
            <div class="row g-3">
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="logoText" placeholder="Logo" disabled>
                    <label for="logoText"><i class="bi bi-postage me-1"></i> Logo</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="kaseText" placeholder="İmza & Kaşe" disabled>
                    <label for="kaseText"><i class="bi bi-file-person me-1"></i> İmza & Kaşe</label>
                </div>
                <div class="col-md-4 form-floating">
                    <input type="text" class="form-control" id="nickInput" name="nick" placeholder="Firma Kısa Adı"
                        disabled>
                    <label for="nickInput"><i class="bi bi-arrows-angle-contract me-2"></i> Firma Kısa Adı</label>
                </div>
            </div>
        </div> <!-- /#content-add -->
    </div> <!-- /.card-body -->
</div>

<div class="card shadow-sm border-0 col-11 col-md-8 col-lg-6 mx-auto my-4">
    <div class="card-header">
        <h5 class="card-title mb-0">Departman Sorumluları</h5>
    </div>
    <div class="card-body p-4">

        <!-- Satır 1: Depo -->
        <div class="border rounded p-3 mb-3">
            <div class="row g-3">
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="depoInput" placeholder="Depo">
                    <label for="depoInput"><i class="bi bi-box-seam me-2"></i> Depo</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="depoUnInput" placeholder="Unvan"
                        value="Depo ve Sevkiyat Sorumlusu">
                    <label for="depoUnInput"><i class="bi bi-person-lines-fill me-2"></i> Unvan</label>
                </div>
            </div>
        </div>

        <!-- Satır 2: Üretim -->
        <div class="border rounded p-3 mb-3">
            <div class="row g-3">
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="uretimInput" placeholder="Üretim">
                    <label for="uretimInput"><i class="bi bi-gear-wide-connected me-2"></i> Üretim</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="uretimUnInput" placeholder="Unvan"
                        value="Üretim ve Planlama Sorumlusu">
                    <label for="uretimUnInput"><i class="bi bi-person-lines-fill me-2"></i> Unvan</label>
                </div>
            </div>
        </div>

        <!-- Satır 3: Mali -->
        <div class="border rounded p-3 mb-3">
            <div class="row g-3">
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="maliInput" placeholder="Mali İşler">
                    <label for="maliInput"><i class="bi bi-cash-coin me-2"></i> Mali İşler</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="maliUnInput" placeholder="Unvan"
                        value="Mali İşler Sorumlusu ve Muhasebe Müdürü">
                    <label for="maliUnInput"><i class="bi bi-person-lines-fill me-2"></i> Unvan</label>
                </div>
            </div>
        </div>

        <!-- Satır 4: Kalite -->
        <div class="border rounded p-3 mb-3">
            <div class="row g-3">
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="kaliteInput" placeholder="Kalite Kontrol">
                    <label for="kaliteInput"><i class="bi bi-check2-square me-2"></i> Kalite Kontrol</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="kaliteUnInput" placeholder="Unvan"
                        value="Kalite Kontrol">
                    <label for="kaliteUnInput"><i class="bi bi-person-lines-fill me-2"></i> Unvan</label>
                </div>
            </div>
        </div>

        <!-- Satır 5: Satın Alma -->
        <div class="border rounded p-3 mb-3">
            <div class="row g-3">
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="satinInput" placeholder="Satın Alma">
                    <label for="satinInput"><i class="bi bi-bag-check me-2"></i> Satın Alma</label>
                </div>
                <div class="col-md-6 form-floating">
                    <input type="text" class="form-control" id="satinUnInput" placeholder="Unvan"
                        value="Satın Alma Müdürü">
                    <label for="satinUnInput"><i class="bi bi-person-lines-fill me-2"></i> Unvan</label>
                </div>
            </div>
        </div>

        <!-- Alt Satır: Doküman Tarihi, Rev. No, Rev. Tarihi -->
        <div class="row g-3">
            <div class="col-md-4 form-floating">
                <input type="date" class="form-control" id="dokumanTarihiInput" placeholder="Doküman Tarihi">
                <label for="dokumanTarihiInput"><i class="bi bi-calendar-date me-2"></i> Doküman Tarihi</label>
            </div>
            <div class="col-md-4 form-floating">
                <input type="text" class="form-control" id="revNoInput" placeholder="Revizyon No">
                <label for="revNoInput"><i class="bi bi-arrow-repeat me-2"></i> Rev. No</label>
            </div>
            <div class="col-md-4 form-floating">
                <input type="date" class="form-control" id="revTarihiInput" placeholder="Revizyon Tarihi">
                <label for="revTarihiInput"><i class="bi bi-calendar-date me-2"></i> Rev. Tarihi</label>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm border-0 col-11 col-md-8 col-lg-6 mx-auto my-4">
    <div class="card-header">
        <h5 class="card-title mb-0">Set Seçimi</h5>
    </div>

    <div class="card-body position-relative">
        <!-- Spinner (Yükleme Animasyonu) -->
        <div id="loading-docSelector" class="card-loading-wrapper d-none">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Yükleniyor...</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressWrapperContainer-docSelector"
            class="d-none position-absolute top-50 start-50 translate-middle text-center w-100"
            style="max-width: 600px;">
            <h5 id="progressTitle" class="mb-3">Dokümanlar Yazdırılıyor</h5>
            <div class="progress w-100" id="progressWrapper" style="height: 20px;">
                <div id="progressBar-docSelector" class="progress-bar progress-bar-striped progress-bar-animated"
                    role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%
                </div>
            </div>
        </div>

        <!-- İçerik -->
        <div id="content-docSelector" style="opacity: 0; pointer-events: none;">
            <div class="row g-3">
                <!-- Klasör Butonu -->
                <div class="col-md-2 d-grid">
                    <button class="btn btn-outline-danger folder-open" id="openNickNameFolder"
                        title="Firma Klasörünü aç">
                        <i class="bi bi-folder2-open me-2"></i>Firma Klasörü
                    </button>
                </div>

                <!-- Açılır Menü -->
                <div class="col-md-6">
                    <select class="form-select" id="docSelect" aria-label="Belge Seç">
                        <option selected disabled>Set Seçimi</option>
                    </select>
                </div>

                <!-- Gönder Butonu -->
                <div class="col-md-4 d-grid">
                    <button type="button" id="sendDocBtn" class="btn btn-primary">
                        <i class="bi bi-send me-2"></i>Gönder
                    </button>
                </div>
            </div>
        </div> <!-- /#content-docSelector -->
    </div>
</div>
