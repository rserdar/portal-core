<div class="container py-4">
    <div class="fs-2 fw-light fst-italic mb-4 text-center">Arama Ekranı</div>

    <!-- Arama Kutusu -->
    <div class="row g-3 mb-3 align-items-center justify-content-center">
        <div class="col-auto text-center fw-bold fst-italic bg-warning rounded-pill px-3 py-1">
            <label for="searchInput" class="col-form-label bi bi-search m-0 text-dark">&nbsp;Arama&nbsp;:</label>
        </div>
        <div class="col-md-6 col-10">
            <input type="search" id="searchInput" class="form-control" aria-describedby="searchCounter"
                placeholder="Aramak için yazınız...">
        </div>
        <div class="col-auto">
            <span id="searchCounter" class="form-text fs-6 fw-bold text-muted">

            </span>
        </div>
    </div>

    <!-- Sonuçları Gösteren Kart -->
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 1200px;">
        <div class="card-body p-4">
            <div class="table-responsive-lg">
                <table class="table table-hover table-bordered align-middle mb-0">
                    <thead class="bg-light bg-gradient">
                        <tr>
                            <th scope="col" class="text-center" style="width: 5%;">
                                <!-- ID sütunu gizlendi -->
                                <div class="d-flex align-items-center justify-content-center">
                                    <i class="bi bi-hash"></i>
                                </div>
                            </th>
                            <th scope="col" style="width: 50%;">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-building me-2"></i> Unvan
                                </div>
                            </th>
                            <th scope="col" style="width: 15%;">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-folder2-open me-2"></i> Klasör
                                </div>
                            </th>
                            <th scope="col" class="text-center" style="width: 15%;">
                                <div class="d-flex align-items-center justify-content-center">
                                    <i class="bi bi-geo me-2"></i> Şehir
                                </div>
                            </th>
                            <th scope="col" class="text-center" style="width: 5%;">
                                <div class="d-flex align-items-center justify-content-center">
                                    <i class="bi bi-pencil-square me-2"></i> Düzenle
                                </div>
                            </th>
                            <th scope="col" class="text-center" style="width: 10%;">
                                <div class="d-flex align-items-center justify-content-center">
                                    <i class="bi bi-trash me-2"></i> Sil
                                </div>
                            </th>
                        </tr>
                    </thead>


                    <tbody id="searchResults">
                        <!-- Dinamik içerik buraya gelecek -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<template id="rowTemplate">
    <tr class="result-box">
        <th class="firmaId text-center" scope="row"></th>
        <td class="unvan" style="word-wrap: break-word;"></td>
        <td class="text-decoration-underline text-primary fw-semibold clickable-cell folder-open" role="button"
            tabindex="0"></td>
        <td class="sehir text-center"></td>
        <td class="text-center">
            <button type="button" class="btn btn-outline-primary show-company">Gözat</button>
        </td>
        <td class="text-center">
            <div class="btn-group gap-2" role="group">
                <button type="button" class="btn btn-outline-danger delete-button d-none">Onayla</button>
                <button type="button" class="btn btn-outline-danger before-delete-button"
                    data-button-state="delete">Sil</button>
            </div>
        </td>
    </tr>
</template>
