    <script>
        // LocalStorage ve SessionStorage anahtarları
        const LOCAL_STORAGE_KEY = 'searchData';
        const SESSION_STORAGE_KEY = 'searchDataSession';
        const LAST_UPDATE_KEY = 'searchDataLastUpdate';
        const THEME_KEY = 'userThemePreference';
        const SESSION_THEME_KEY = 'userSessionThemePreference';

        // Verinin güncellenmesi gereken aralık (milisaniye cinsinden)
        const UPDATE_INTERVAL = 60 * 60 * 1000; // 1 saat

        // Global değişkenler
        let data = [];
        let normalizedData = [];

        let cityWords = [];

        // Loading toggle function
        function toggleLoading(show = true) {
            document.getElementById("loading").classList.toggle("invisible", !show);

        // Kart için yükleme animasyonu ve progress bar kontrolü
        // Spinner ve içerik kontrolü
        function toggleCardLoading(cardId, isLoading) {
            const loadingElement = document.getElementById(`loading-${cardId}`);
            const contentElement = document.getElementById(`content-${cardId}`);

            if (isLoading) {
                // Spinner'ı görünür yap, içeriği gizle
                loadingElement?.classList.remove("d-none");
                contentElement.style.opacity = "0.3"; // Hafif opak kalsın istiyorsan
                contentElement.style.pointerEvents = "none"; // İçeriği tıklanamaz yap
            } else {
                // Spinner'ı gizle, içeriği geri yükle
                loadingElement?.classList.add("d-none");
                contentElement.style.opacity = "1";
                contentElement.style.pointerEvents = "auto"; // İçeriği tıklanabilir yap
            }
        }

        // Progress bar güncelleme
        function updateProgressBar(wrapperId, isVisible, progress = 0, completed = 0, total = 0, isCompleted = false, progressBarId = "progressBar-certificates") {
            const progressWrapperContainer = document.getElementById(wrapperId);
            const progressBarElement = document.getElementById(progressBarId);

            // ID'den içerik alanını dinamik olarak çıkar (örnek: progressBar-docSelector → content-docSelector)
            const contentId = progressBarId.replace("progressBar", "content");
            const contentElement = document.getElementById(contentId);

            if (!progressWrapperContainer || !progressBarElement || !contentElement) {
                console.error("Progress bar veya container veya content element bulunamadı:", wrapperId, progressBarId);
                return;
            }

            if (isVisible) {
                progressWrapperContainer.classList.remove("d-none");
                contentElement.style.opacity = "0";
                contentElement.style.pointerEvents = "none";

                progressBarElement.style.width = `${progress}%`;
                progressBarElement.setAttribute("aria-valuenow", progress);

                progressBarElement.textContent = isCompleted
                    ? `${total} İşlem Tamamlandı`
                    : `${progress}%`;

                if (isCompleted) progressBarElement.classList.remove("progress-bar-animated");

            } else {
                progressWrapperContainer.classList.add("d-none");
                contentElement.style.opacity = "1";
                contentElement.style.pointerEvents = "auto";

                progressBarElement.style.width = "0%";
                progressBarElement.setAttribute("aria-valuenow", "0");
                progressBarElement.textContent = "0%";
            }
        }

        // ********************************** \\____//
        // **  Çerez Kaydetme Seçenekleri  ** .\\__//
        // ********************************** ..\\//

        // Veriyi yerel depolamaya kaydetme fonksiyonu
        function saveDataToStorage(data) {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
            sessionStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(data));
            localStorage.setItem(LAST_UPDATE_KEY, Date.now().toString());
        }

        // Yerel depolamadan veriyi getirme fonksiyonu
        function getDataFromStorage() {
            const localData = localStorage.getItem(LOCAL_STORAGE_KEY);
            const sessionData = sessionStorage.getItem(SESSION_STORAGE_KEY);
            if (sessionData) return JSON.parse(sessionData);
            if (localData) return JSON.parse(localData);
            return null;
        }

        // Verinin güncellenmesi gerektiğini kontrol etme fonksiyonu
        function isDataUpdateNeeded() {
            const lastUpdate = localStorage.getItem(LAST_UPDATE_KEY);
            if (!lastUpdate) return true; // Eğer güncelleme zamanı yoksa veri çekilir
            return (Date.now() - parseInt(lastUpdate)) > UPDATE_INTERVAL;
        }

        // Sunucudan veri çekme fonksiyonu
        function fetchDataFromServer() {
            return new Promise((resolve, reject) => {
                toggleLoading(true);
                google.script.run
                    .withSuccessHandler(function (dataReturned) {
                        if (dataReturned) {
                            data = JSON.parse(JSON.stringify(dataReturned)); // Gelen veriyi kopyala
                            saveDataToStorage(data); // Veriyi yerel depolamaya kaydet
                            resolve(data);
                        }
                        toggleLoading(false);
                    })
                    .withFailureHandler(function (error) {
                        console.error("Veri yükleme hatası: ", error);
                        showToast('<i class="bi bi-cloud-lightning-rain"></i> Veri yükleme hatası: ' + error.message, "danger");
                        toggleLoading(false);
                        reject(error);
                    })
                    .getDataForSearch();
            });
        }

        // *************************** \\____//
        // **  Yükleme Seçenekleri  ** .\\__//
        // *************************** ..\\//

        // Load view function with error handling
        function loadView({ id = "app", func, callback = () => { }, params = null }) {
            toggleLoading(true);
            google.script.run
                .withSuccessHandler(function (html) {
                    document.getElementById(id).innerHTML = html;
                    callback(params); // Belirtilen callback fonksiyonunu çağır
                    toggleLoading(false); // Başarılı durumda yükleme gizlenir
                })
                .withFailureHandler(function (error) {
                    showToast('<i class="bi bi-airplane-engines-fill"></i> Veri yükleme hatası: ' + error.message, "danger");
                    console.error("Veri yükleme hatası: ", error);
                    toggleLoading(false); // Hata durumunda yükleme gizlenir
                })[func]();
        }

        // Toast mesajı gösteren fonksiyon
        function showToast(message, type) {
            // Toast container oluştur
            const toastContainer = document.createElement("div");
            toastContainer.className = `toast align-items-center text-bg-${type} border-0 position-fixed`;
            toastContainer.role = "alert";
            toastContainer.style.cssText = `
          z-index: 9999;
          bottom: 1rem;
          left: 50%;
          transform: translateX(-50%);
          max-width: 90%;
          width: auto;
        `;

            // Toast içeriği
            const toastBody = `
          <div class="d-flex">
            <div class="toast-body text-center">
              ${message}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
        `;

            toastContainer.innerHTML = toastBody;
            document.body.appendChild(toastContainer);

            // Bootstrap Toast başlatma
            const bootstrapToast = new bootstrap.Toast(toastContainer);
            bootstrapToast.show();

            // Toast otomatik kaldırma
            setTimeout(() => {
                toastContainer.remove();
            }, 5000);
        }

        // ********** Kart 1 ********** \\

        function unvanSplit() {
            try {
                // Unvan girişini al ve gereksiz boşlukları temizle
                var unvan1 = document.getElementById("unvanInput").value.trim();

                // Giriş boşsa işlem yapma
                if (!unvan1) {
                    alert("Unvan alanı boş. Lütfen bir değer giriniz.");
                    return;
                }

                // Noktalama işaretlerini kaldır (.,; gibi) ve birden fazla boşluğu temizle
                unvan1 = unvan1.replace(/[.,;:!?(){}[\]'"-]/g, "").replace(/\s+/g, " ");

                // Kısaltmaları (D.Y.S. gibi) kontrol et ve noktaları kaldır
                unvan1 = unvan1.replace(/\b([A-ZİĞÜŞÖÇ]{1,})\./g, "$1");

                // Her kelimenin ilk harfini büyük yapma
                var splitStr = unvan1.toLocaleLowerCase("tr-TR").split(/\s+/);
                for (var i = 0; i < splitStr.length; i++) {
                    // Kısaltma değilse baş harfi büyük, diğer harfler küçük
                    if (splitStr[i].length > 1) {
                        splitStr[i] =
                            splitStr[i].charAt(0).toLocaleUpperCase("tr-TR") +
                            splitStr[i].substring(1);
                    } else {
                        // Kısaltmalar için büyük harf bırak
                        splitStr[i] = splitStr[i].toLocaleUpperCase("tr-TR");
                    }
                }

                // Kısaltmaları büyük harfle bırak, diğer kelimeleri düzenle
                var unvan2 = splitStr.join(" ");

                // Unvanı 3 parçaya ayırma
                var unvan3;
                if (splitStr.length >= 3) {
                    unvan3 = splitStr[0] + " " + splitStr[1] + " " + splitStr[2];
                } else {
                    unvan3 = splitStr.join(" "); // Eğer 3 kelimeden azsa mevcut kelimelerle oluştur
                }

                // Sonucu nick alanına yazdırma
                document.getElementById("nickInput").value = unvan3;
            } catch (error) {
                showToast('<i class="bi bi-vr"></i> Bir hata oluştu: ' + error.message, "danger");
                console.error("Hata oluştu:", error.message);
            }
        }

        function docsToPDF() {
            const pdfInputElement = document.getElementById("convertPdfInput");

                if (documentId) {
                    showToast("⏳ PDF dönüştürme işlemi başlatılıyor...", "info");

                        .withSuccessHandler(result => {

                            if (result && result.message) {

        function formatDateToDots(dateString) {
            return dateString.split("-").reverse().join(".");
        }

        function a1Full() {
            const tarih1 = document.getElementById("a1Basla").value;
            const tarih2 = document.getElementById("a1Bitis").value;

            const date1 = new Date(tarih1);
            const date2 = new Date(tarih2);
            const date3 = new Date(date1);
            date3.setDate(date3.getDate() + 1);

            const diffTime = Math.abs(date2 - date1);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            document.getElementById("a1Md").value = diffDays + 1;

            if (diffDays === 0) {
                document.getElementById("a1Full").value = formatDateToDots(tarih2);
            } else if (diffDays === 1 && date1.getFullYear() === date2.getFullYear()) {
                const son = formatDateToDots(tarih2);
                if (date1.getMonth() === date2.getMonth()) {
                    document.getElementById("a1Full").value = `${("0" + date1.getDate()).slice(-2)}-${son}`;
                } else {
                    document.getElementById("a1Full").value = `${("0" + date1.getDate()).slice(-2)}.${("0" + (date1.getMonth() + 1)).slice(-2)}-${son}`;
                }
            } else if (diffDays === 2 && date1.getFullYear() === date2.getFullYear()) {
                const son = formatDateToDots(tarih2);
                if (date1.getMonth() === date2.getMonth() && date2.getMonth() === date3.getMonth()) {
                    document.getElementById("a1Full").value = `${("0" + date1.getDate()).slice(-2)}-${("0" + date3.getDate()).slice(-2)}-${son}`;
                } else {
                    const part1 = `${("0" + date1.getDate()).slice(-2)}.${("0" + (date1.getMonth() + 1)).slice(-2)}`;
                    const part2 = `${("0" + date3.getDate()).slice(-2)}-${son}`;
                    document.getElementById("a1Full").value = `${part1}-${part2}`;
                }
            } else {
                const son = formatDateToDots(tarih2);
                if (date1.getFullYear() === date2.getFullYear()) {
                    const part1 = `${("0" + date1.getDate()).slice(-2)}.${("0" + (date1.getMonth() + 1)).slice(-2)}`;
                    document.getElementById("a1Full").value = `${part1}-${son}`;
                } else {

        function acilirIsoMenu(arrayOfArrays) {
            // Gerekli tüm HTML elementlerini seçiyoruz

            var pstandartInput = document.getElementById("pstandartInput");
            var otherStandard = document.getElementById("otherStandardContainer");
            var suggestedCertNoInput = document.getElementById("suggestedCertNoInput");
            var firmaIdInput = document.getElementById("firmaIdInput");

            // Her iki dropdown menüsü için de aynı doldurma işlemini yap
            [cstandartInput, pstandartInput].forEach(function (items) {
                // Önce mevcut içeriği temizliyoruz
                items.innerHTML = "";

                // İlk olarak "Seçiniz..." seçeneğini ekliyoruz
                var defaultOption = document.createElement("option");
                defaultOption.textContent = "Seçiniz...";
                defaultOption.value = ""; // Boş bir value atanır
                defaultOption.disabled = true;
                defaultOption.selected = true;
                items.appendChild(defaultOption);

                // E-Tablodan gelen veriler üzerinden döngü kur
                arrayOfArrays.forEach(function (r, index) {
                    var option = document.createElement("option");

                    // Seçeneğin görünen metni her zaman A sütunundaki değer (örn: "9001")
                    option.textContent = r[0];

                    if (items.id === "pstandartInput") {
                        option.value = r[0];
                    }

                    else {
                        option.value = index;
                    }

                    items.appendChild(option);
                });
            });

            cstandartInput.addEventListener("change", function (event) {
                var selectedIndex = event.target.value; // Seçilen satırın indexini al

                // 1. "Diğer" seçeneği için input'u göster/gizle
                if (selectedIndex && (arrayOfArrays[selectedIndex][0] === "Diğer" || arrayOfArrays[selectedIndex][0] === "CE")) {
                    otherStandard.classList.remove("d-none");
                } else {
                    otherStandard.classList.add("d-none");
                    otherStandard.value = "";

                // 2. Sertifika detayı ve numarası önerme işlemleri
                if (selectedIndex) {
                    // C sütunundaki değeri yaz
                    var cValue = arrayOfArrays[selectedIndex][2];
                    document.getElementById("isoFullinp").value = cValue;

                    // B sütunundaki veriyi al
                    var firstValue = arrayOfArrays[selectedIndex][1];

        function copyCertificate(element) {
            if (element.matches(".copy-certificate")) {
                // Sertifika ID'sini kopyala
                const copyid = element.dataset.certId;
                navigator.clipboard.writeText(copyid);

                // Butonu güncelle: Renk değiştir, simge değiştir
                element.classList.remove("btn-outline-secondary"); // Varsayılan rengi kaldır
                element.classList.add("btn-success"); // Yeşil rengi ekle
                element.classList.remove("bi-copy"); // Kopya simgesini kaldır
                element.classList.add("bi-check-all"); // Onay simgesini ekle

                // 3 saniye sonra butonu eski haline döndür
                setTimeout(() => {
                    element.classList.remove("btn-success"); // Yeşil rengi kaldır
                    element.classList.add("btn-outline-secondary"); // Varsayılan rengi geri ekle
                    element.classList.remove("bi-check-all"); // Onay simgesini kaldır
                    element.classList.add("bi-copy"); // Kopya simgesini geri ekle
                }, 3000);
            }
        }

        function addOneYear() {
            const gstInput = document.getElementById("gstInput");
            const gozInput = document.getElementById("gozInput");

            // gstInput değeri alınır
            const gstDateValue = gstInput.value;

            if (!gstDateValue) {
                alert("Lütfen Geçerli Sertifika Tarihi girin!");
                return;
            }

            // Tarih hesaplamaları
            const gstDate = new Date(gstDateValue);

            // Yıl değerine +1 ekle
            gstDate.setFullYear(gstDate.getFullYear() + 1);

            // Gün değerinden -1 çıkar
            gstDate.setDate(gstDate.getDate() - 1);

            // Hesaplanan tarihi gozetim alanına yaz
            const formattedDate = gstDate.toISOString().split("T")[0]; // YYYY-MM-DD formatında al
            gozInput.value = formattedDate;
        }

        function toggleVisibilityFields(companyInfo) {
            const visibilityMappings = {
                yazisma: ["sube-adres", "yazismaText"],
                tel: ["btel", "TelText", "tel:" + companyInfo.tel],
                faks: ["bfax", "FaxText", "tel:" + companyInfo.faks],
                mail: ["bmail", "MailText", "mailto:" + companyInfo.mail],
                www: ["bweb", "WebText", "http://" + companyInfo.www],
                vergiD: ["bvd", "VDText"],
                vergiN: ["bvn", "VNText"],
                kyt: ["bkyt", "KYTText"],
                yetA: ["byadi", "YadiText"],
                yetU: ["byunvan", "YUnvanText"],
                irtA: ["birtK", "irtKText"],
                irtU: ["birtU", "irtUnText"],
                irtN: ["bitel", "ItelText", "tel:" + companyInfo.irtN],
                irtM: ["bimail", "ImailText", "mailto:" + companyInfo.irtM],
                danisman: ["bdan", "danText"],
                logo: ["blogo", "logoText", "https://drive.google.com/file/d/" + companyInfo.logo + "/view"],
                kase: ["bkase", "kaseText", "https://drive.google.com/file/d/" + companyInfo.kase + "/view"],
                not: ["bnot", "NotText"],
            };

            for (var key in visibilityMappings) {
                if (visibilityMappings.hasOwnProperty(key)) {
                    var mapping = visibilityMappings[key];
                    var containerId = mapping[0];
                    var textId = mapping[1];
                    var hrefValue = mapping[2] || null;

                    // toggleVisibility fonksiyonunu çağır
                    toggleVisibility(companyInfo[key], containerId, textId, hrefValue);
                }
            }
        }

        function toggleVisibility(value, containerId, textId, hrefValue) {
            const container = document.getElementById(containerId);
            const textElement = document.getElementById(textId);

            if (value) {
                // Görünür yap
                container.style.visibility = "visible";
                container.style.position = "relative";

                textElement.textContent = value;

                // Eğer bağlantı değeri varsa href ekle
                if (hrefValue) {
                    textElement.innerHTML = `<a href="${hrefValue}" target="_blank">${value}</a>`;
                }
            } else {
                // Gizle
                container.style.visibility = "hidden";
                container.style.position = "absolute"; // DOM'da yer kaplamasını engelle
            }
        }

        function cokluSertBas() {
            const checkBoxes = document.getElementsByClassName("select-certificate");
            const selectedCertificates = Array.from(checkBoxes).filter(cb => cb.checked);
            const totalCerts = selectedCertificates.length;

            if (totalCerts === 0) {
                showToast('<i class="bi bi-emoji-frown"></i> Lütfen en az bir sertifika seçin.', "warning");
                return;
            }

            let completedCerts = 0;

            // Progress bar'ı başlat
            updateProgressBar("progressWrapperContainer-certificates", true, 10, completedCerts, totalCerts, false, "progressBar-certificates");

            // **ÖNCE KLASÖRÜ KONTROL ET VE OLUŞTUR**
            kontrolVeOlusturKlasor(folderId => {
                if (!folderId) {
                    showToast('<i class="bi bi-emoji-frown"></i> Klasör oluşturma sırasında hata oluştu!', "danger");
                    return;
                }

                // **Tüm sertifikaları belirlenen klasör içine kaydet**
                selectedCertificates.forEach(checkBox => {
                    const certId = checkBox.dataset.certId;
                    sertifikaBas(certId, folderId, () => {
                        completedCerts++;

                        // Progress bar güncelle
                        const progress = Math.round(((completedCerts / totalCerts) * 90) + 10);
                        updateProgressBar("progressWrapperContainer-certificates", true, progress, completedCerts, totalCerts, false, "progressBar-certificates");

                        if (completedCerts === totalCerts) {
                            setTimeout(() => {
                                updateProgressBar("progressWrapperContainer-certificates", true, 100, completedCerts, totalCerts, true, "progressBar-certificates");

                                setTimeout(() => {
                                    updateProgressBar("progressWrapperContainer-certificates", false, 0, 0, totalCerts, false, "progressBar-certificates");
                                }, 1500);
                            }, 500);
                        }
                    });
                });
            });
        }

         * Sunucudan gelen dosyaları modal içinde listeler.

        function displayFiles(files) {
            const fileListElement = document.getElementById("fileList");
            if (!fileListElement) {
                console.error("'fileList' ID'li element bulunamadı.");
                return;
            }
            fileListElement.innerHTML = ""; // Önceki listeyi temizle

            if (!files || files.length === 0) {
                const emptyMessage = document.createElement("li");
                emptyMessage.className = "list-group-item text-danger text-center";
                emptyMessage.textContent = "Bu türde hiç dosya bulunamadı veya klasör boş.";
                fileListElement.appendChild(emptyMessage);
                return;
            }

            files.forEach(file => {
                const li = document.createElement("li");
                li.className = "list-group-item d-flex justify-content-between align-items-center flex-wrap";

                const fileInfoDiv = document.createElement("div");
                fileInfoDiv.className = "me-auto"; // Butonla arasında otomatik boşluk

                const fileNameSpan = document.createElement("span");
                fileNameSpan.textContent = file.name;
                fileNameSpan.className = "fw-bold"; // Dosya adını kalın yap
                fileInfoDiv.appendChild(fileNameSpan);

                // Oluşturulma tarihini göster (sunucudan dateCreated gelmeli)
                if (file.dateCreated) {
                    const dateSpan = document.createElement("span");
                    dateSpan.className = "text-muted small d-block"; // Alt satırda, küçük ve soluk renkte

                    const displayDate = new Date(file.dateCreated); // Sunucudan gelen string tarihi Date objesine çevir
                    // Kullanıcının tarayıcı ayarlarına göre tarihi formatla
                    dateSpan.textContent = `Oluşturulma: ${displayDate.toLocaleDateString(navigator.language, {
                        year: 'numeric', // veya '2-digit'
                        month: 'short',  // veya 'numeric', 'long'
                        day: 'numeric'
                    })}`;
                    fileInfoDiv.appendChild(dateSpan);
                }
                li.appendChild(fileInfoDiv);

                const selectBtn = document.createElement("button");
                selectBtn.className = "btn btn-sm btn-success";
                selectBtn.textContent = "Seç";
                selectBtn.type = "button"; // Form içinde submit olmasını engelle
                selectBtn.onclick = () => selectFile(file);
                // Mobil cihazlarda butonun sıkışmaması için küçük ekranlarda alt satıra geçince üstten biraz boşluk
                selectBtn.classList.add("mt-2", "mt-md-0", "ms-md-2");

                li.appendChild(selectBtn);
                fileListElement.appendChild(li);
            });
        }

        function uploadImageToDrive(fileInput, inputIdToFill) {
            const file = fileInput.files[0];
            const firmaInput = document.getElementById("cNickName");

            if (!file) {
                alert("Lütfen bir dosya seçin.");
                return;
            }

            if (!firmaInput || !firmaInput.value.trim()) {
                alert("Firma kısa adı boş olamaz!");
                return;
            }

            const firmaNick = firmaInput.value.trim();

            const reader = new FileReader();
            reader.onload = function (e) {
                const parts = reader.result.split(',');
                if (parts.length < 2) {
                    alert("Dosya okunamadı!");
                    return;
                }

                const uploadObj = {
                    fileName: file.name,
                    mimeType: file.type,
                    data: parts[1],
                };

                google.script.run
                    .withSuccessHandler((res) => {
                        if (res && res.status && res.fileId) {
                            const input = document.getElementById(inputIdToFill);
                            if (input) input.value = res.fileId;
                            alert(`Yükleme başarılı!\n${res.fileName}`);
                        } else {
                            alert("Yükleme başarısız.");
                        }
                    })
                    .withFailureHandler((err) => {
                        alert("Yükleme sırasında bir hata oluştu:\n" + err.message);
                    })
                    .doUpload(uploadObj, firmaNick);
            };

            reader.onerror = function () {
                alert("Dosya okunurken hata oluştu.");
            };

            reader.readAsDataURL(file);
        }

        function cokluTestBas() {
            const checkBoxes = document.getElementsByClassName("select-test");
            const selectedTests = Array.from(checkBoxes).filter(cb => cb.checked);
            const totalTests = selectedTests.length;

            if (totalTests === 0) {
                showToast('<i class="bi bi-emoji-frown"></i> Lütfen en az bir test seçin.', "warning");
                return;
            }

            let completedTests = 0;

            // Progress bar'ı başlat
            updateProgressBar("progressWrapperContainer-tests", true, 10, completedTests, totalTests, false, "progressBar-tests");

            // **ÖNCE KLASÖRÜ KONTROL ET VE OLUŞTUR**
            kontrolVeOlusturKlasor(folderId => {
                if (!folderId) {
                    showToast('<i class="bi bi-emoji-frown"></i> Klasör oluşturma sırasında hata oluştu!', "danger");
                    return;
                }

                showToast(`<i class="bi bi-folder"></i> Klasör oluşturuldu veya bulundu: ${folderId}`, "success");

                // **Tüm testleri belirlenen klasör içine kaydet**
                selectedTests.forEach(checkBox => {
                    const testId = checkBox.dataset.testId;
                    testBas(testId, folderId, () => {
                        completedTests++;

                        // Progress bar güncelle
                        const progress = Math.round(((completedTests / totalTests) * 90) + 10);
                        updateProgressBar("progressWrapperContainer-tests", true, progress, completedTests, totalTests, false, "progressBar-tests");

                        if (completedTests === totalTests) {
                            setTimeout(() => {
                                updateProgressBar("progressWrapperContainer-tests", true, 100, completedTests, totalTests, true, "progressBar-tests");

                                setTimeout(() => {
                                    updateProgressBar("progressWrapperContainer-tests", false, 0, 0, totalTests, false, "progressBar-tests");
                                }, 1500);
                            }, 500);
                        }
                    });
                });
            });
        }

        function testBas(testId, folderId, callback) {

            if (!testId || !folderId) {
                console.error("❌ testId veya folderId eksik");
                return;
            }

            const langCheckbox = document.getElementById("lang_tests");

            const testlang = langCheckbox?.checked ? "TR" : "EN";

            google.script.run
                .withSuccessHandler(testdata => {

                    if (!testdata) {
                        console.error("❌ testdata null veya undefined geldi!");
                        showToast('<i class="bi bi-printer-x"></i> Test verisi boş geldi.', "danger");
                        callback();
                        return;
                    }

                    google.script.run
                        .withSuccessHandler(() => {
                            callback();
                        })
                        .withFailureHandler(error => {
                            console.error("🔥 testBas fonksiyonu başarısız:", error);
                            showToast(`<i class="bi bi-printer-x"></i> Test yazdırma başarısız. Hata: ${error.message}`, "danger");
                            callback();
                        })
                        .testBas(testdata, folderId);
                })
                .withFailureHandler(error => {
                    console.error("🔥 testVeri fonksiyonu başarısız:", error);
                    showToast('<i class="bi bi-printer-x"></i> Test verisi çekilemedi.', "danger");
                    callback();
                })
                .testVeri(testId, testlang);
        }

        function startChunkedDocumentGeneration(rows, data, klasorMap) {
            const total = rows.length;
            let completed = 0;

            // Belge listelerini 50’lik parçalara ayır
            const chunks = [];
            for (let i = 0; i < rows.length; i += 50) {
                chunks.push(rows.slice(i, i + 50));
            }

            // İşleyici başlat
            processNextChunk(0);

            function processNextChunk(index) {
                if (index >= chunks.length) {
                    updateProgressBar("progressWrapperContainer-docSelector", true, 100, completed, total, true, "progressBar-docSelector");
                    setTimeout(() => {
                        updateProgressBar("progressWrapperContainer-docSelector", false, 0, 0, total, false, "progressBar-docSelector");
                    }, 1500);
                    return;
                }

                const currentChunk = chunks[index];
                let innerCompleted = 0;

                // ☕ Moladan sonra kullanıcıyı bilgilendir
                if (index > 0) {
                    showToast("☕ Ahmet Çakar Mode: ON, bana bi 3-5 dakika müsaade edin çocuklar, 2 dakika bunalıma girdim çünkü", "info");
                    setTimeout(() => {
                        showToast("👋 Tamam, nerede kalmıştık? Devam ediyoruz!", "info");
                        runChunk();
                    }, 5000); // 5 saniye mola
                } else {
                    runChunk();
                }

                function runChunk() {
                    currentChunk.forEach(row => {
                        google.script.run
                            .withSuccessHandler(() => {
                                completed++;
                                innerCompleted++;
                                const progress = Math.round(((completed / total) * 90) + 10);
                                updateProgressBar("progressWrapperContainer-docSelector", true, progress, completed, total, false, "progressBar-docSelector");

                                if (innerCompleted === currentChunk.length) {
                                    processNextChunk(index + 1);
                                }
                            })
                            .withFailureHandler(err => {
                                showToast("❌ Belge oluşturulamadı: " + err.message, "danger");
                            })
                            .createSingleDocument(row, data, klasorMap);
                    });
                }
            }
        }

        // Türkçe karakterleri normalize eden fonksiyon
        function normalizeString(str) {
            const turkishChars = {
                'ı': 'i', 'İ': 'i',
                'ş': 's', 'Ş': 's',
                'ç': 'c', 'Ç': 'c',
                'ğ': 'g', 'Ğ': 'g',
                'ü': 'u', 'Ü': 'u',
                'ö': 'o', 'Ö': 'o'
            };

            // Noktalama işaretlerini temizleme
            str = str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, '');
            // Türkçe karakterleri normalleştirme ve küçük harfe çevirme
            return str.split('').map(char => turkishChars[char] || char).join('').toLowerCase();
        }

        // Arama fonksiyonu
        function search() {
            if (data.length === 0) { // Eğer data yüklenmediyse arama yapmadan döner
                showToast('<i class="bi bi-pause-circle"></i> Veri henüz yüklenmedi.', "danger");
                console.error("Veri henüz yüklenmedi.");
                return;
            }

            let searchInput = document.getElementById("searchInput").value.toString().trim();
            searchWords = [];
            cityWords = [];

            if (searchInput.includes("@")) {
                // "@" işareti varsa, Unvan ve Firma Nickname ayrılıyor, Şehir ayrı tutuluyor
                const splitInput = searchInput.split("@");
                searchWords = splitInput[0].trim() !== "" ? splitInput[0].trim().split(" ").map(normalizeString) : []; // Unvan ve Firma Nickname araması
                cityWords = splitInput[1].trim() !== "" ? splitInput[1].trim().split(" ").map(normalizeString) : []; // Şehir araması
            } else {
                // "@" işareti yoksa sadece Unvan ve Firma Nickname aranacak
                searchWords = searchInput.split(" ").map(normalizeString);
            }

            const resultsArray = data.filter(r => {
                let firmaNicknameUnvanMatch = searchWords.length === 0 || searchWords.every(word => {
                    return normalizeString(r[1].toString()).includes(word) || normalizeString(r[2].toString()).includes(word);
                    // Firma Nickname (r[1]) ve Unvan (r[2]) sütunlarında arama yap
                });

                let cityMatch = cityWords.length === 0 || cityWords.every(word => {
                    return normalizeString(r[4].toString()).includes(word); // Şehir sütununda (r[4]) arama yapılır
                });

                return firmaNicknameUnvanMatch && cityMatch;
            });

            updateSearchResults(resultsArray);
        }

        function applyFilters(table, startDateEl, endDateEl, consultantEl, supervisionCheck, fieldEl, typeEl, valueEl) {
            const startDateValue = startDateEl.value;
            const endDateValue = endDateEl.value;
            const consultant = consultantEl.value;
            const selectedDateColumn = document.getElementById("dateColumnSelect").value; // Seçili tarih sütununu al
            const filterField = fieldEl.value;
            const filterType = typeEl.value;
            const filterValue = valueEl.value;

            // Tarih inputlarını Date nesnesine çeviriyoruz
            const startDate = startDateValue ? luxon.DateTime.fromISO(startDateValue).toJSDate() : null;
            const endDate = endDateValue ? luxon.DateTime.fromISO(endDateValue).toJSDate() : null;

            // Özel filtre fonksiyonu
            table.setFilter(function (data) {
                let certDate = null;

                // Seçili tarih sütununa göre tarih değerini ayarlayın
                if (selectedDateColumn === "sertifika-tarihi") {
                    certDate = luxon.DateTime.fromFormat(data["Sertifika Tarihi"], "dd.MM.yyyy").toJSDate();
                } else if (selectedDateColumn === "gozetim-tarihi") {
                    certDate = luxon.DateTime.fromFormat(data["Sertifika Gözetim Tarihi"], "dd.MM.yyyy").toJSDate();
                }

                // Tarih aralığı kontrolü
                let dateInRange = true;
                if (startDate && certDate < startDate) {
                    dateInRange = false; // Eğer başlangıç tarihinden önceyse
                }
                if (endDate && certDate > endDate) {
                    dateInRange = false; // Eğer bitiş tarihinden sonraysa
                }

                // Danışman kontrolü
                let consultantMatch = true;
                if (consultant && data["Danışman"] !== consultant) {
                    consultantMatch = false; // Eğer danışman eşleşmiyorsa
                }

                // Pasif olan sertifikaları gizle kontrolü
                const isSupervisionChecked = supervisionCheck.checked;
                let supervisionMatch = true;
                if (isSupervisionChecked && data["Gözetim"] === 1) {
                    supervisionMatch = false; // Eğer pasif olan sertifikaları gizle seçiliyse ve Gözetim 1 ise (aktif)
                }

                // Eklenen yeni filtre alanları için kontrol
                let extraFilterMatch = true;
                if (filterField && filterType && filterValue) {
                    switch (filterType) {
                        case "=":
                            extraFilterMatch = data[filterField] == filterValue;
                            break;
                        case "!=":
                            extraFilterMatch = data[filterField] != filterValue;
                            break;
                        case ">":
                            extraFilterMatch = data[filterField] > filterValue;
                            break;
                        case ">=":
                            extraFilterMatch = data[filterField] >= filterValue;
                            break;
                        case "<":
                            extraFilterMatch = data[filterField] < filterValue;
                            break;
                        case "<=":
                            extraFilterMatch = data[filterField] <= filterValue;
                            break;
                        case "like":
                            extraFilterMatch = data[filterField].toLowerCase().includes(filterValue.toLowerCase());
                            break;
                    }
                }

                // Tüm filtre kontrollerinin birlikte çalışması
                return dateInRange && consultantMatch && supervisionMatch && extraFilterMatch;
            });
        }

        function saveThemeToStorage(theme) {
            localStorage.setItem(THEME_KEY, theme); // LocalStorage'a kaydediliyor
            sessionStorage.setItem(SESSION_THEME_KEY, theme); // SessionStorage'a kaydediliyor
        }

        // Yerel depolamadan tema tercihini getirme fonksiyonu
        function getThemeFromStorage() {
            const sessionTheme = sessionStorage.getItem(SESSION_THEME_KEY);
            const localTheme = localStorage.getItem(THEME_KEY);
            return sessionTheme || localTheme || 'system'; // Öncelik sırasına göre döner, varsayılan 'system'
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            } else if (theme === 'light') {
                document.documentElement.setAttribute('data-bs-theme', 'light');
            } else {
                const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-bs-theme', systemTheme);
            }
            saveThemeToStorage(theme);
            updateIcon(theme);
            updateSelectedBackground(theme);
        }

        function clickEventHandler(e) {
            const actionKey = Object.keys(clickEventActions).find(selector =>
                e.target.closest(selector)
            );

            if (!actionKey) {
                const copyButton = e.target.closest('button[data-clipboard]');
                if (copyButton) handleClipboardCopy(copyButton);
                return;
            }

            const matchedElement = e.target.closest(actionKey); // DOM elementi
            const actionFn = clickEventActions[actionKey];

            try {
                actionFn(matchedElement); // ✅ Sadece matchedElement gönderiyoruz
            } catch (err) {
                console.error("clickEventHandler error:", err);
            }
        }

        // Kopyalama işlevini yöneten fonksiyon
        function handleClipboardCopy(button) {
            const targetId = button.getAttribute('data-clipboard');
            let targetText;

            if (targetId === 'adresText') {
                // Eğer adresText ise adres, şehir ve ülke bilgilerini birleştir
                const adres = document.getElementById("adresText")?.innerText.trim() || "";
                const sehir = document.getElementById("sehirText")?.innerText.trim() || "";
                const ulke = document.getElementById("ulkeText")?.innerText.trim() || "";
                targetText = `${adres} - ${sehir} / ${ulke}`;
            } else {
                // Diğer tüm normal durumlarda hedef ID'yi kullan
                targetText = document.getElementById(targetId)?.innerText.trim();
            }

            // Önceki mesajı kaldır
            const existingMessage = button.parentNode.querySelector('.text-success');
            if (existingMessage) existingMessage.remove();

            // Kopyalama işlemi
            if (targetText) {
                navigator.clipboard.writeText(targetText).then(() => {
                    const copyMessage = document.createElement('span');
                    copyMessage.className = 'text-success ms-2';
                    copyMessage.textContent = 'Kopyalandı!';
                    button.parentNode.appendChild(copyMessage);

                    setTimeout(() => {
                        copyMessage.remove();
                    }, 2000);

                    button.title = "Kopyalandı!";
                }).catch(err => {
                    console.error('Kopyalama başarısız:', err);
                    showToast('<i class="bi bi-copy"></i> Kopyalama başarısız: ' + err.message, "danger");
                });
            } else {
                button.title = "Kopyalanacak bilgi yok!";
            }
        }

        function addClickEventListener(elementId, handlerFunction) {
            const element = document.getElementById(elementId);
            if (element) {
                element.addEventListener("click", handlerFunction);
            }
        }

        const changeEventActions = {
            "#unvanInput": unvanSplit,
            "#xstandartInput": denetimDropdown,
            "#leadAuditorInput1": a1Yaz,
            "#secondAuditorInput1": a1Yaz,
            "#thirdAuditorInput1": a1Yaz,
            "#leadAuditorInput2": a2Yaz,
            "#secondAuditorInput2": a2Yaz,
            "#thirdAuditorInput2": a2Yaz,
            "#denetimInput": toggleStage2Visibility,
            "#kdv-haric": kdvHaricHesap,
            "#toplam-fiyat": profToplam,
            "#kdv-tutar": kdvTutar,
            "#otherCheckbox": othercheck,
            "#testKategori": testDropOne,
            "#testDropdown": testDropTwo,
            "#testDokuman": testDropThree,
        };

        function changeEventHandler(e) {
            const actionKey = Object.keys(changeEventActions).find(selector => e.target.matches(selector));
            if (actionKey) {
                changeEventActions[actionKey](e);
                return;
            }
        }

        // Sayfa yüklendiğinde başlatma
        document.addEventListener("DOMContentLoaded", function () {
            initializeTheme();
            initializeEvents();
            loadSearchView(); // Ana görünümü yükle
            initializeNavbarEvents();

            // Tüm event listener'ları burada eklemelisin
            const app = document.getElementById("app");
            if (app) {
                app.addEventListener("input", inputEventHandler);
                app.addEventListener("change", changeEventHandler);
                app.addEventListener("click", clickEventHandler);
            } else {
                console.warn("⚠️ #app elementi DOM'da bulunamadı.");
            }

            const rcSearchBtn = document.getElementById("rcsearch");
            if (rcSearchBtn) rcSearchBtn.addEventListener("click", clickEventHandler);

            const forceUpdateBtn = document.getElementById("forceupdate");
            if (forceUpdateBtn) forceUpdateBtn.addEventListener("click", clickEventHandler);
        });
    </script>
