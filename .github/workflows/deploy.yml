name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-check:
    name: Build check (default tenant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          TENANT_ID: default
        run: npm run build

